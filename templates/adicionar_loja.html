<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

{% include 'header.html' %}

<br>
<br>
<br>
<div class="admin-container">
    <h4 class="rgb-text" style="margin-bottom: 30px;">Gerir Lojas</h4>


    <div class="admin-form" style="margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
        <h3 style="color: white; margin-bottom: 25px; text-align: center; font-family: 'Rajdhani', sans-serif;">Criar
            Nova Loja</h3>

        <form method="POST">
            <label style="font-weight: bold; color: #ddd; margin-bottom: 6px;">Nome da Loja</label>
            <input type="text" name="nome" placeholder="ex: Chip7 Saldanha" required
                style="color: #333; background-color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; margin-bottom: 20px;">

            <label style="font-weight: bold; color: #ddd; margin-bottom: 6px;">Localização / Morada</label>
            <input type="text" name="localizacao" placeholder="ex: Av. da República, Lisboa" required
                style="color: #333; background-color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; margin-bottom: 20px;">

            <label style="font-weight: bold; color: #ddd; margin-bottom: 6px;">Contacto Telefónico</label>
            <input type="text" name="contacto" placeholder="ex: 210000000"
                style="color: #333; background-color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; margin-bottom: 25px;">

            <button type="submit" class="btn-premium-success"
                style="width: 100%; border: none; font-size: 1.1rem; padding: 12px; font-weight: bold; border-radius: 8px;">
                Adicionar Loja
            </button>
        </form>
    </div>

    <!-- Listagem das Lojas -->
    <div
        style="background: linear-gradient(90deg, #0f172a, #1e3a8a); padding: 35px; border-radius: 15px; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;">
        <h3 style="margin-bottom: 25px; text-align: center; font-family: 'Rajdhani', sans-serif;">Lojas Registadas</h3>

        <div class="table-responsive">
            <table class="table table-dark table-hover table-striped align-middle text-center"
                style="border-radius: 10px; overflow: hidden; margin: 0; width: 100%;">
                <thead>
                    <tr>
                        <th style="width: 100px;">ID</th>
                        <th>Nome</th>
                        <th>Localização</th>
                        <th>Contacto</th>
                    </tr>
                </thead>
                <tbody>
                    {% for loja in lojas %}
                    <tr>
                        <td>{{ loja[0] }}</td>
                        <td><strong>{{ loja[1] }}</strong></td>
                        <td>{{ loja[2] }}</td>
                        <td>{{ loja[3] if loja[3] else 'N/A' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <br>
    <a href="/admin" class="btn-premium" style="text-decoration: none;"> Voltar ao Painel</a>
</div>

<br>

<h4 class="rgb-text">Contacte-nos Por E-Mail</h4>
<br>
<br>
<br>
<div class="grid2">
    <form action="{{ url_for('contactos_email.enviar_email') }}" method="POST">

        <label>Introduza o seu nome:</label>
        <input type="text" name="nome" required>
        <label>Introduza o seu e-mail:</label>
        <input type="email" name="email" required>
        <label>Escreva o conteudo do e-mail:</label>
        <textarea name="mensagem" required></textarea>
        <button type="submit">Enviar</button>

    </form>
</div>

{% include 'header.html' %}


<br>
<br>
<br>
<br>
<div class="admin-form">

    <h4 class="rgb-text">Adicionar Produto</h4>

    <form method="POST">

        <label>Nome do Produto</label>
        <input type="text" name="nome" required>

        <label>Descrição</label>
        <textarea name="descricao"></textarea>

        <label>Preço</label>
        <input type="number" step="0.01" name="preco" required>

        <label>Categoria</label>
        <select name="categoria_id" class="form-select mb-3" required style="cursor: pointer;">
            {% for cat in categorias %}
            <option value="{{ cat[0] }}">{{ cat[1] }}</option>
            {% endfor %}
        </select>

        <label>Imagem (URL)</label>
        <input type="text" name="imagem">

        <label>Quantidade em Stock</label>
        <input type="number" name="quantidade" value="0" min="0" required>

        <button type="submit">
            Adicionar Produto
        </button>

    </form>

</div>

{% include 'footer.html' %}
